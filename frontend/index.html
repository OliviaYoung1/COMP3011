<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Analytics Dashboard</title>
  <link rel="stylesheet" href="styles.css?v=1.0" />
</head>
<body>

  <!-- ─── HEADER ─── -->
  <header>
    <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="12" fill="#1DB954"/>
      <path d="M17.25 16.13a.75.75 0 01-1.03.24c-2.83-1.73-6.39-2.12-10.58-1.16a.75.75 0 01-.34-1.46c4.59-1.05 8.52-.6 11.7 1.35.35.21.46.67.25 1.03zm1.46-3.25a.94.94 0 01-1.29.31C14.4 11.08 10.2 10.5 6.98 11.5a.94.94 0 01-.55-1.79c3.66-1.12 8.2-.58 11.3 1.87.43.27.57.85.28 1.3zm.13-3.39C15.5 7.27 9.17 7.07 5.89 8.06a1.12 1.12 0 01-.65-2.14C9.07 4.8 16.07 5.03 20 7.56a1.12 1.12 0 01-1.16 1.93z" fill="#000"/>
    </svg>
    <h1>Spotify <span>Analytics</span> Dashboard</h1>
  </header>

  <main>

    <!-- ─── TOP TRACKS ─── -->
    <section id="top-tracks">
      <div class="section-header">
        <h2>
          <span class="icon">🎵</span>
          Top Tracks
        </h2>
      </div>
      <div id="top-tracks-list">
        <div class="loading-pulse">
          <span></span><span></span><span></span>
        </div>
      </div>
    </section>

    <!-- ─── CREATE + ADD (side by side) ─── -->
    <div class="two-col-row">

      <!-- Create Playlist -->
      <section id="create-playlist">
        <div class="section-header">
          <h2>
            <span class="icon">＋</span>
            Create a New Playlist
          </h2>
        </div>
        <div class="form-body">
          <div>
            <label for="playlist-name">Playlist Name</label>
            <input id="playlist-name" type="text" placeholder="My awesome playlist" />
          </div>
          <div>
            <label for="playlist-description">Description</label>
            <input id="playlist-description" type="text" placeholder="Add an optional description" />
          </div>
          <button class="btn-primary" onclick="createPlaylist()">Create Playlist</button>
        </div>
      </section>

      <!-- Add Track to Playlist -->
      <section id="add-track">
        <div class="section-header">
          <h2>
            <span class="icon">🎶</span>
            Add Track to Playlist
          </h2>
        </div>
        <div class="form-body">
          <div>
            <label for="playlist-search">Choose Playlist</label>
            <input type="text" id="playlist-search" placeholder="Search playlists…" onkeyup="filterPlaylists()" />
            <select id="playlist-select" style="margin-top:8px"></select>
          </div>
          <div>
            <label for="track-search">Search for a Track</label>
            <input type="text" id="track-search" placeholder="Type to search…" onkeyup="searchTracks()" />
            <div id="track-results"></div>
          </div>
          <button class="btn-primary" onclick="addTrack()">Add Track</button>
        </div>
      </section>

    </div>

    <!-- ─── YOUR PLAYLISTS ─── -->
    <section id="playlists">
      <div class="section-header">
        <h2>
          <span class="icon">📋</span>
          Your Playlists
        </h2>
      </div>
      <div id="playlist-list"></div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
