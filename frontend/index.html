<body>

    <h1>Spotify Analytics Dashboard</h1>

    <!-- TOP TRACKS SECTION -->
    <section id="top-tracks">
        <h2>Top Tracks</h2>
        <div id="top-tracks-list">Loading...</div>
    </section>

    <!-- PLAYLIST CREATION -->
    <section id="create-playlist">
        <h2>Create a New Playlist</h2>
        <input id="playlist-name" placeholder="Playlist name">
        <input id="playlist-description" placeholder="Description">
        <button onclick="createPlaylist()">Create Playlist</button>
    </section>

    <!-- ADD TRACK TO PLAYLIST -->
    <section id="add-track">
        <h2>Add Track to Playlist</h2>
        <input id="playlist-id" placeholder="Playlist ID">
        <input id="track-id" placeholder="Track ID">
        <button onclick="addTrack()">Add Track</button>
    </section>

    <!-- ALL PLAYLISTS -->
    <section id="playlists">
        <h2>Your Playlists</h2>
        <div id="playlist-list"></div>
    </section>

    <script src="app.js"></script>
</body>
